<h1 mat-dialog-title class="text-center">
  {{ mode === 'create' ? 'เพิ่ม User' : 'ตั้งค่า User' }}
</h1>

<mat-dialog-content>
        <div class="card card-bg-transparen">
          <div class="card-body">
            <div class="row">
              <div class="col-6">
                <form class="mat-input-form">
                  <mat-form-field class="w-100">
                  <mat-label>UserName</mat-label>
                    <input matInput class="text-center" [ngModelOptions]="{standalone: true}" [(ngModel)]="userName" [disabled]="mode === 'update'">
                  </mat-form-field>
                </form>
              </div>

              <div class="col-6">
                <form class="mat-input-form">
                  <mat-form-field class="w-100">
                  <mat-label>New Password</mat-label>
                    <input
                      matInput
                      class="text-center"
                      [type]="hideNewPassword ? 'password' : 'text'"
                      [ngModelOptions]="{standalone: true}"
                      [(ngModel)]="newPassword"
                      autocomplete="new-password">
                    <button
                      type="button"
                      mat-icon-button
                      matSuffix
                      (click)="hideNewPassword = !hideNewPassword"
                      [attr.aria-label]="hideNewPassword ? 'Show password' : 'Hide password'">
                      <mat-icon>{{ hideNewPassword ? 'visibility' : 'visibility_off' }}</mat-icon>
                    </button>
                    <mat-hint>
                      {{ mode === 'create'
                        ? 'ต้องกรอกรหัสผ่าน 8-16 ตัวอักษร'
                        : 'เว้นว่างได้ หากไม่ต้องการเปลี่ยนรหัสผ่าน (8-16 ตัวอักษร)' }}
                    </mat-hint>
                  </mat-form-field>
                </form>
              </div>

              <div class="col-12">
                <form class="mat-input-form">
                  <mat-form-field class="w-100">
                      <mat-label>Role Name</mat-label>
                      <mat-select [ngModelOptions]="{standalone: true}" class="text-center"  [(ngModel)]="roleId">
                        @for (res of roleList; track res) {
                          <mat-option [value]="res.value">{{res.name}}</mat-option>
                        }
                      </mat-select>
                  </mat-form-field>
                </form>
              </div>

              <div class="col-12">
                <form class="mat-input-form">
                  <mat-form-field class="w-100">
                  <mat-label>E-mail</mat-label>
                    <input matInput class="text-center" [ngModelOptions]="{standalone: true}" [(ngModel)]="userEmail">
                  </mat-form-field>
                </form>
              </div>



            </div>
          </div>
        </div>
</mat-dialog-content>

<mat-dialog-actions class="d-flex justify-content-center mt-2">
  <button type="button" class="btn btn-danger" matButton mat-dialog-close>ยกเลิก</button>
  <button type="button" class="btn btn-success ms-2" matButton cdkFocusInitial (click)="submitUser()">
    {{ mode === 'create' ? 'เพิ่มผู้ใช้' : 'ยืนยัน' }}
  </button>
</mat-dialog-actions>
